<svg width="1040" height="120" viewBox="0 0 1040 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Noire signal wave divider</title>
  <desc id="desc">An animated holographic signal wave divider with cyan and violet scanline pulses.</desc>
  <defs>
    <linearGradient id="waveA" x1="80" y1="60" x2="960" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050510" stop-opacity="0"/>
      <stop offset=".18" stop-color="#7C3AED" stop-opacity=".65"/>
      <stop offset=".5" stop-color="#22D3EE"/>
      <stop offset=".82" stop-color="#2DD4BF" stop-opacity=".65"/>
      <stop offset="1" stop-color="#050510" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1040" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset=".48" stop-color="#F8FAFC" stop-opacity=".72"/>
      <stop offset=".55" stop-color="#22D3EE" stop-opacity=".55"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="0" y="0" width="1040" height="120" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1040" height="120" rx="18" fill="#050510" fill-opacity=".02"/>
  <g filter="url(#glow)">
    <path d="M70 60C120 60 120 42 170 42C220 42 220 78 270 78C320 78 320 48 370 48C420 48 420 72 470 72C520 72 520 38 570 38C620 38 620 82 670 82C720 82 720 52 770 52C820 52 820 68 870 68C920 68 920 60 970 60" stroke="url(#waveA)" stroke-width="2.5" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" values="-18 0;18 0;-18 0" dur="6.2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values=".5;1;.58;.9;.5" dur="5.4s" repeatCount="indefinite"/>
    </path>
    <path d="M92 60H948" stroke="url(#waveA)" stroke-opacity=".32"/>
    <path d="M176 60H226M316 60H374M486 60H556M678 60H720M808 60H882" stroke="#F8FAFC" stroke-opacity=".38" stroke-width="1.4" stroke-linecap="round">
      <animate attributeName="stroke-opacity" values=".12;.66;.2;.48;.12" dur="4.4s" repeatCount="indefinite"/>
    </path>
    <circle cx="520" cy="60" r="5" fill="#22D3EE"/>
    <circle cx="520" cy="60" r="16" stroke="#7C3AED" stroke-opacity=".42">
      <animate attributeName="r" values="10;26;10" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values=".55;.08;.55" dur="3.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  <rect x="-180" y="48" width="160" height="24" rx="12" fill="url(#pulse)" opacity=".5">
    <animate attributeName="x" values="-180;1040" dur="5.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.5;0" dur="5.7s" repeatCount="indefinite"/>
  </rect>
  <rect x="1040" y="76" width="120" height="12" rx="6" fill="url(#pulse)" opacity=".3">
    <animate attributeName="x" values="1040;-160" dur="8.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.34;0" dur="8.1s" repeatCount="indefinite"/>
  </rect>
</svg>
