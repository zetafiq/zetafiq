<svg width="760" height="74" viewBox="0 0 760 74" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Noire Core typing signal</title>
  <desc id="desc">A terminal-style typing line that cycles through one visible phrase at a time: Initializing Noire Core, LizNoiree signal online, and Building quietly, shipping carefully.</desc>
  <defs>
    <linearGradient id="shell" x1="0" y1="0" x2="760" y2="74" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050510"/>
      <stop offset=".5" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#080617"/>
    </linearGradient>
    <linearGradient id="edge" x1="80" y1="37" x2="680" y2="37" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset=".5" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <filter id="softGlow" x="-20" y="-20" width="800" height="114" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="clipPhraseOne">
      <rect x="220" y="22" width="0" height="30">
        <animate attributeName="width" values="0;232;232;0;0" keyTimes="0;.18;.285;.305;1" dur="12s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="clipPhraseTwo">
      <rect x="220" y="22" width="0" height="30">
        <animate attributeName="width" values="0;0;258;258;0;0" keyTimes="0;.333;.50;.618;.638;1" dur="12s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="clipPhraseThree">
      <rect x="220" y="22" width="0" height="30">
        <animate attributeName="width" values="0;0;344;344;0;0" keyTimes="0;.667;.845;.952;.982;1" dur="12s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect x="2" y="2" width="756" height="70" rx="18" fill="url(#shell)" stroke="url(#edge)" stroke-opacity=".72" stroke-width="2"/>
  <path d="M24 58H736" stroke="#22D3EE" stroke-opacity=".12"/>
  <circle cx="32" cy="37" r="6" fill="#7C3AED"/>
  <circle cx="54" cy="37" r="6" fill="#22D3EE"/>
  <circle cx="76" cy="37" r="6" fill="#2DD4BF"/>

  <g font-family="Consolas, Menlo, monospace" font-size="18">
    <text x="108" y="45" fill="#94A3B8">$</text>
    <text x="132" y="45" fill="#94A3B8">signal:</text>
  </g>

  <g font-family="Consolas, Menlo, monospace" font-size="18" filter="url(#softGlow)">
    <g opacity="1">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;.285;.305;1" dur="12s" repeatCount="indefinite"/>
      <text x="220" y="45" clip-path="url(#clipPhraseOne)" fill="#22D3EE">Initializing Noire Core...</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;.333;.35;.618;.638;1" dur="12s" repeatCount="indefinite"/>
      <text x="220" y="45" clip-path="url(#clipPhraseTwo)" fill="#C4B5FD">LizNoiree signal online...</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;.667;.685;.952;.982;1" dur="12s" repeatCount="indefinite"/>
      <text x="220" y="45" clip-path="url(#clipPhraseThree)" fill="#2DD4BF">Building quietly. Shipping carefully.</text>
    </g>
  </g>

  <rect x="592" y="24" width="9" height="24" rx="2" fill="#22D3EE">
    <animate attributeName="opacity" values="1;0;1" dur=".9s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#22D3EE;#C4B5FD;#2DD4BF;#22D3EE" keyTimes="0;.333;.667;1" dur="12s" repeatCount="indefinite"/>
  </rect>
</svg>
