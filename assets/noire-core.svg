<svg width="720" height="540" viewBox="0 0 720 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated Noire Core manifold</title>
  <desc id="desc">A layered purple and cyan manifold system core with orbiting nodes, pulse rings, rotating geometry, and energy sweeps.</desc>
  <defs>
    <radialGradient id="space" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 270) rotate(90) scale(270 350)">
      <stop offset="0" stop-color="#172047"/>
      <stop offset=".42" stop-color="#080617"/>
      <stop offset="1" stop-color="#050510"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 270) rotate(90) scale(118 144)">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset=".16" stop-color="#22D3EE"/>
      <stop offset=".48" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#050510" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ribbonA" x1="120" y1="130" x2="620" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED" stop-opacity=".08"/>
      <stop offset=".28" stop-color="#22D3EE" stop-opacity=".95"/>
      <stop offset=".62" stop-color="#F8FAFC" stop-opacity=".55"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity=".16"/>
    </linearGradient>
    <linearGradient id="ribbonB" x1="100" y1="398" x2="640" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2DD4BF" stop-opacity=".14"/>
      <stop offset=".45" stop-color="#7C3AED" stop-opacity=".9"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity=".18"/>
    </linearGradient>
    <linearGradient id="ribbonC" x1="180" y1="80" x2="540" y2="462" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C4B5FD" stop-opacity=".26"/>
      <stop offset=".5" stop-color="#2DD4BF" stop-opacity=".85"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity=".28"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="270" x2="720" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset=".48" stop-color="#22D3EE" stop-opacity=".72"/>
      <stop offset=".55" stop-color="#F8FAFC" stop-opacity=".55"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowHeavy" x="-140" y="-140" width="1000" height="820" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSoft" x="-80" y="-80" width="880" height="700" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="orbClip">
      <circle cx="360" cy="270" r="186"/>
    </clipPath>
  </defs>

  <rect width="720" height="540" rx="38" fill="url(#space)"/>
  <g opacity=".5">
    <circle cx="96" cy="120" r="1.2" fill="#F8FAFC"/>
    <circle cx="156" cy="422" r="1.1" fill="#22D3EE"/>
    <circle cx="590" cy="92" r="1.4" fill="#2DD4BF"/>
    <circle cx="642" cy="348" r="1.2" fill="#C4B5FD"/>
    <circle cx="254" cy="84" r="1" fill="#94A3B8"/>
    <circle cx="518" cy="456" r="1.1" fill="#F8FAFC"/>
    <circle cx="660" cy="186" r="1" fill="#22D3EE"/>
  </g>

  <g opacity=".28" stroke="#22D3EE" stroke-width="1">
    <path d="M92 270H628"/>
    <path d="M360 54V486"/>
    <ellipse cx="360" cy="270" rx="254" ry="92"/>
    <ellipse cx="360" cy="270" rx="92" ry="254" transform="rotate(58 360 270)"/>
    <ellipse cx="360" cy="270" rx="96" ry="254" transform="rotate(-58 360 270)"/>
  </g>

  <g filter="url(#glowHeavy)">
    <circle cx="360" cy="270" r="198" fill="#080617" fill-opacity=".62" stroke="#22D3EE" stroke-opacity=".35"/>
    <circle cx="360" cy="270" r="154" fill="#050510" fill-opacity=".5" stroke="#7C3AED" stroke-opacity=".48"/>
    <circle cx="360" cy="270" r="104" fill="url(#coreGlow)" opacity=".92">
      <animate attributeName="r" values="92;112;92" dur="5.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".72;.96;.72" dur="5.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g clip-path="url(#orbClip)" filter="url(#glowSoft)">
    <path d="M128 273C188 126 286 94 367 184C452 278 552 168 612 94" stroke="url(#ribbonA)" stroke-width="28" stroke-linecap="round" opacity=".86">
      <animate attributeName="stroke-opacity" values=".45;.96;.58;.9;.45" dur="6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="-12 0;14 0;-12 0" dur="8s" repeatCount="indefinite"/>
    </path>
    <path d="M108 382C214 274 266 430 362 348C462 262 520 418 630 212" stroke="url(#ribbonB)" stroke-width="24" stroke-linecap="round" opacity=".8">
      <animate attributeName="stroke-opacity" values=".38;.84;.52;.78;.38" dur="7.2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="12 0;-16 0;12 0" dur="9s" repeatCount="indefinite"/>
    </path>
    <path d="M194 90C270 210 176 266 292 322C406 376 462 246 532 452" stroke="url(#ribbonC)" stroke-width="20" stroke-linecap="round" opacity=".72">
      <animate attributeName="stroke-opacity" values=".32;.78;.44;.7;.32" dur="8.4s" repeatCount="indefinite"/>
    </path>
    <path d="M178 300C258 212 314 222 360 270C410 320 480 314 548 220" stroke="#F8FAFC" stroke-opacity=".32" stroke-width="2"/>
    <path d="M238 164C330 318 406 320 488 162" stroke="#22D3EE" stroke-opacity=".54" stroke-width="2"/>
    <path d="M220 392C320 214 430 210 512 376" stroke="#C4B5FD" stroke-opacity=".38" stroke-width="2"/>
  </g>

  <g opacity=".6">
    <rect x="-160" y="250" width="180" height="38" rx="19" fill="url(#sweep)">
      <animate attributeName="x" values="-180;720" dur="5.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;.72;0" dur="5.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="720" y="296" width="150" height="24" rx="12" fill="url(#sweep)" opacity=".4">
      <animate attributeName="x" values="720;-180" dur="8.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;.5;0" dur="8.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g opacity=".9">
    <circle cx="360" cy="270" r="72" fill="#050510" fill-opacity=".72" stroke="#22D3EE" stroke-opacity=".9" stroke-width="1.5"/>
    <circle cx="360" cy="270" r="42" fill="#22D3EE" fill-opacity=".16" stroke="#F8FAFC" stroke-opacity=".56"/>
    <circle cx="360" cy="270" r="17" fill="#7C3AED" fill-opacity=".35" stroke="#22D3EE"/>
    <circle cx="360" cy="270" r="6" fill="#F8FAFC"/>
    <path d="M360 198V164M360 376V342M288 270H254M466 270H432M310 220L286 196M410 320L434 344M410 220L434 196M310 320L286 344" stroke="#22D3EE" stroke-opacity=".74" stroke-width="1.5" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="rotate" from="0 360 270" to="360 360 270" dur="26s" repeatCount="indefinite"/>
  </g>

  <g>
    <circle cx="360" cy="270" r="224" fill="none" stroke="#22D3EE" stroke-opacity=".18">
      <animate attributeName="r" values="190;232;190" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values=".05;.34;.05" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="360" cy="270" r="258" fill="none" stroke="#7C3AED" stroke-opacity=".14">
      <animate attributeName="r" values="218;268;218" dur="7.5s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values=".03;.28;.03" dur="7.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g>
    <g>
      <circle cx="560" cy="270" r="5" fill="#22D3EE"/>
      <circle cx="560" cy="270" r="12" stroke="#22D3EE" stroke-opacity=".35"/>
      <animateTransform attributeName="transform" type="rotate" from="0 360 270" to="360 360 270" dur="10s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle cx="184" cy="270" r="4" fill="#C4B5FD"/>
      <circle cx="184" cy="270" r="10" stroke="#7C3AED" stroke-opacity=".4"/>
      <animateTransform attributeName="transform" type="rotate" from="80 360 270" to="440 360 270" dur="14s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle cx="360" cy="88" r="4.5" fill="#2DD4BF"/>
      <circle cx="360" cy="88" r="11" stroke="#2DD4BF" stroke-opacity=".32"/>
      <animateTransform attributeName="transform" type="rotate" from="170 360 270" to="530 360 270" dur="18s" repeatCount="indefinite"/>
    </g>
  </g>

  <g opacity=".82" stroke-linecap="round">
    <path d="M210 136L260 136M460 136L510 136M210 404L260 404M460 404L510 404" stroke="#7C3AED" stroke-width="2"/>
    <path d="M126 222V176H172M594 222V176H548M126 318V364H172M594 318V364H548" stroke="#22D3EE" stroke-opacity=".62" stroke-width="1.4"/>
  </g>
</svg>
